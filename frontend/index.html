<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Civic Complaint System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 1100px;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: #007bff;
            color: white;
        }

        button:hover {
            background: #0056b3;
        }

        .update-btn {
            padding: 8px 14px;
            font-size: 14px;
            background: #28a745;
        }

        .update-btn:hover {
            background: #1e7e34;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filters select {
            width: 220px;
            margin: 0;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-card h4 {
            margin: 0 0 10px;
            color: #333;
        }

        .stat-card p {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: #007bff;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 10px;
        }

        .chart-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #f1f1f1;
        }

        .High {
            color: red;
            font-weight: bold;
        }

        .Medium {
            color: orange;
            font-weight: bold;
        }

        .Low {
            color: green;
            font-weight: bold;
        }

        .Pending {
            color: orange;
            font-weight: bold;
        }

        .InProgress {
            color: blue;
            font-weight: bold;
        }

        .Resolved {
            color: green;
            font-weight: bold;
        }

        .status-dropdown {
            width: 140px;
            margin-top: 6px;
            padding: 8px;
        }

        .status-text {
            margin-bottom: 4px;
        }

        #result {
            margin-top: 12px;
            font-weight: bold;
            color: green;
        }

        @media (max-width: 900px) {
            .container {
                width: 95%;
            }

            .dashboard-cards,
            .charts-container {
                grid-template-columns: 1fr;
            }

            .filters select {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🏛️ Civic Complaint Management System</h1>

    <!-- Submit Complaint -->
    <div class="card">
        <h3>Submit Complaint</h3>

        <label>Category</label>
        <select id="category">
            <option value="">-- Select Category --</option>
            <option value="Road">Road</option>
            <option value="Water">Water</option>
            <option value="Garbage">Garbage</option>
            <option value="Street Light">Street Light</option>
            <option value="Safety">Safety</option>
        </select>

        <label>Description</label>
        <textarea id="complaint" rows="4" placeholder="Describe your complaint..."></textarea>

        <button onclick="submitComplaint()">Submit</button>
        <p id="result"></p>
    </div>

    <!-- Dashboard Cards -->
    <div class="card">
        <h3>Dashboard Summary</h3>
        <div class="dashboard-cards">
            <div class="stat-card">
                <h4>Total Complaints</h4>
                <p id="totalComplaints">--</p>
            </div>

            <div class="stat-card">
                <h4>High Priority</h4>
                <p id="highComplaints">--</p>
            </div>

            <div class="stat-card">
                <h4>Pending</h4>
                <p id="pendingComplaints">--</p>
            </div>

            <div class="stat-card">
                <h4>Resolved</h4>
                <p id="resolvedComplaints">--</p>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="card">
        <h3>Complaint Analytics</h3>
        <div class="charts-container">
            <div class="chart-box">
                <canvas id="priorityChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Admin Table -->
    <div class="card">
        <h3>All Complaints (Admin View)</h3>

        <div class="filters">
            <select id="filterStatus" onchange="loadComplaints()">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Resolved">Resolved</option>
            </select>

            <select id="filterCategory" onchange="loadComplaints()">
                <option value="">All Categories</option>
                <option value="Road">Road</option>
                <option value="Water">Water</option>
                <option value="Garbage">Garbage</option>
                <option value="Street Light">Street Light</option>
                <option value="Safety">Safety</option>
            </select>

            <select id="filterDepartment" onchange="loadComplaints()">
                <option value="">All Departments</option>
                <option value="Emergency Department">Emergency Department</option>
                <option value="Water Department">Water Department</option>
                <option value="Sanitation Department">Sanitation Department</option>
                <option value="Electricity Department">Electricity Department</option>
                <option value="Roads Department">Roads Department</option>
                <option value="General Department">General Department</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Complaint</th>
                    <th>Category</th>
                    <th>Priority</th>
                    <th>Department</th>
                    <th>Status</th>
                    <th>Action</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody id="complaintsTable"></tbody>
        </table>
    </div>
</div>

<script>
let priorityChartInstance = null;
let statusChartInstance = null;

function submitComplaint() {
    const complaint = document.getElementById("complaint").value.trim();
    const category = document.getElementById("category").value;
    const result = document.getElementById("result");

    if (!complaint || !category) {
        alert("Fill all fields");
        return;
    }

    fetch("http://127.0.0.1:5000/submit-complaint", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ complaint, category })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            result.style.color = "red";
            result.innerText = data.error;
            return;
        }

        result.style.color = "green";
        result.innerText = "Complaint submitted successfully";
        document.getElementById("complaint").value = "";
        document.getElementById("category").value = "";

        loadComplaints();
        loadCount();
        loadCharts();
    })
    .catch(error => {
        console.error("Error:", error);
        result.style.color = "red";
        result.innerText = "Error submitting complaint";
    });
}

async function loadComplaints() {
    try {
        const res = await fetch("http://127.0.0.1:5000/get-complaints");
        const data = await res.json();

        const filterStatus = document.getElementById("filterStatus").value;
        const filterCategory = document.getElementById("filterCategory").value;
        const filterDepartment = document.getElementById("filterDepartment").value;

        const filteredData = data.filter(c => {
            return (
                (filterStatus === "" || c.status === filterStatus) &&
                (filterCategory === "" || c.category === filterCategory) &&
                (filterDepartment === "" || c.department === filterDepartment)
            );
        });

        const table = document.getElementById("complaintsTable");
        table.innerHTML = "";

        filteredData.forEach(c => {
            const statusClass = c.status === "In Progress" ? "InProgress" : c.status;

            table.innerHTML += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.complaint}</td>
                    <td>${c.category}</td>
                    <td class="${c.priority}">${c.priority}</td>
                    <td>${c.department}</td>
                    <td>
                        <div class="status-text ${statusClass}">${c.status}</div>
                        <select id="status-${c.id}" class="status-dropdown">
                            <option value="Pending" ${c.status === "Pending" ? "selected" : ""}>Pending</option>
                            <option value="In Progress" ${c.status === "In Progress" ? "selected" : ""}>In Progress</option>
                            <option value="Resolved" ${c.status === "Resolved" ? "selected" : ""}>Resolved</option>
                        </select>
                    </td>
                    <td>
                        <button class="update-btn" onclick="updateStatus(${c.id})">Update</button>
                    </td>
                    <td>${new Date(c.created_at).toLocaleString()}</td>
                </tr>
            `;
        });
    } catch (error) {
        console.error("Error loading complaints:", error);
    }
}

function updateStatus(id) {
    const newStatus = document.getElementById(`status-${id}`).value;

    fetch(`http://127.0.0.1:5000/update-status/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ status: newStatus })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
            return;
        }

        alert("Status updated successfully");
        loadComplaints();
        loadCount();
        loadCharts();
    })
    .catch(error => {
        console.error("Error updating status:", error);
        alert("Error updating status");
    });
}

function loadCount() {
    fetch("http://127.0.0.1:5000/get-complaints")
        .then(res => res.json())
        .then(data => {
            const total = data.length;
            const high = data.filter(c => c.priority === "High").length;
            const pending = data.filter(c => c.status === "Pending").length;
            const resolved = data.filter(c => c.status === "Resolved").length;

            document.getElementById("totalComplaints").innerText = total;
            document.getElementById("highComplaints").innerText = high;
            document.getElementById("pendingComplaints").innerText = pending;
            document.getElementById("resolvedComplaints").innerText = resolved;
        })
        .catch(error => {
            console.error("Error loading dashboard counts:", error);
        });
}

function loadCharts() {
    fetch("http://127.0.0.1:5000/get-complaints")
        .then(res => res.json())
        .then(data => {
            const high = data.filter(c => c.priority === "High").length;
            const medium = data.filter(c => c.priority === "Medium").length;
            const low = data.filter(c => c.priority === "Low").length;

            const pending = data.filter(c => c.status === "Pending").length;
            const inProgress = data.filter(c => c.status === "In Progress").length;
            const resolved = data.filter(c => c.status === "Resolved").length;

            const priorityCtx = document.getElementById("priorityChart").getContext("2d");
            const statusCtx = document.getElementById("statusChart").getContext("2d");

            if (priorityChartInstance) {
                priorityChartInstance.destroy();
            }

            if (statusChartInstance) {
                statusChartInstance.destroy();
            }

            priorityChartInstance = new Chart(priorityCtx, {
                type: "bar",
                data: {
                    labels: ["High", "Medium", "Low"],
                    datasets: [{
                        label: "Complaints by Priority",
                        data: [high, medium, low]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            statusChartInstance = new Chart(statusCtx, {
                type: "pie",
                data: {
                    labels: ["Pending", "In Progress", "Resolved"],
                    datasets: [{
                        label: "Complaints by Status",
                        data: [pending, inProgress, resolved]
                    }]
                },
                options: {
                    responsive: true
                }
            });
        })
        .catch(error => {
            console.error("Error loading charts:", error);
        });
}

window.onload = function () {
    loadComplaints();
    loadCount();
    loadCharts();
};
</script>

</body>
</html>
